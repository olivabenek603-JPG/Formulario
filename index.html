<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>CV Creativo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Estilos -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="main-container">

    <!-- FORMULARIO -->
    <div class="form-container">
        <h1>✨ Creador de CV Creativo</h1>

        <input type="text" id="nombre" placeholder="Nombre completo">
        <input type="text" id="profesion" placeholder="Profesión">
        <input type="email" id="email" placeholder="Correo electrónico">
        <input type="text" id="telefono" placeholder="Teléfono">

        <textarea id="perfil" placeholder="Perfil profesional"></textarea>
        <textarea id="experiencia" placeholder="Experiencia laboral"></textarea>
        <textarea id="educacion" placeholder="Educación"></textarea>
        <textarea id="habilidades" placeholder="Habilidades (separadas por coma)"></textarea>

        <!-- IMPORTANTE: type="button" -->
        <button type="button" onclick="generarPDF()">
            Descargar PDF
        </button>
    </div>

</div>

<!-- Librería jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<!-- Tu script -->
<script src="script.js"></script>

</body>
</html>
